; airdeck-papr — AirGradient ONE dashboard on LILYGO T5-4.7" E-Paper
; See PLAN.md §2. Default env matches the RECEIVED board: ESP32-WROVER-E (V1).

[platformio]
default_envs = t5-epd47-v1
src_dir = src
include_dir = include
test_dir = test

; ---------------------------------------------------------------------------
; Shared library + monitor options for the two on-device environments.
; NOTE: this is a plain [common] section (referenced explicitly), NOT the
; magic global [env] section — so it never leaks into the native test build.
; ---------------------------------------------------------------------------
[common]
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
  https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#5b1adc7   ; pinned; builds the classic-ESP32 (I2S/RMT) parallel driver
  lvgl/lvgl@9.2.2
  bblanchon/ArduinoJson@^7.2.0
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DCONFIG_EPD_DISPLAY_TYPE_ED047TC1
  -DCONFIG_EPD_BOARD_REVISION_LILYGO_T5_47
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -Iinclude
  -Isrc

; ---------------------------------------------------------------------------
; DEFAULT — matches the received board (ESP32-WROVER-E, T5-4.7" V1).
; Arduino core 2.0.x (required by LilyGo-EPD47 which needs core <3.0).
; ---------------------------------------------------------------------------
[env:t5-epd47-v1]
platform  = espressif32@6.7.0
framework = arduino
board     = esp32dev
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB        ; MUST match, or the bootloader rejects
board_upload.maximum_size = 16777216  ; the 16MB partition table -> reset loop
board_build.partitions = default_16MB.csv
board_build.f_cpu      = 240000000L
; Stable by-id path so it survives ttyUSB0/ttyUSB1 re-enumeration.
upload_port  = /dev/serial/by-id/usb-Silicon_Labs_CP2104_USB_to_UART_Bridge_Controller_02425E5C-if00-port0
monitor_port = /dev/serial/by-id/usb-Silicon_Labs_CP2104_USB_to_UART_Bridge_Controller_02425E5C-if00-port0
extra_scripts = pre:tools/pio_strip_lvgl_asm.py
monitor_speed   = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
lib_deps  = ${common.lib_deps}
build_flags =
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue           ; WROVER-E PSRAM cache errata — MANDATORY
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_T5_V1=1

; ---------------------------------------------------------------------------
; Battery deep-sleep profile of the received board (PLAN.md §T5, §8.1).
; Same hardware as t5-epd47-v1; single-shot wake->poll->render->sleep.
; ---------------------------------------------------------------------------
[env:t5-epd47-v1-batt]
extends = env:t5-epd47-v1
build_flags =
  ${env:t5-epd47-v1.build_flags}
  -DPROFILE_BATTERY

; ---------------------------------------------------------------------------
; Kept for a FUTURE S3 unit — NOT the received board.
; ---------------------------------------------------------------------------
[env:t5-epd47-s3]
platform  = espressif32@6.7.0
framework = arduino
board     = lilygo-t5-47-s3
board_build.arduino.memory_type = qio_opi
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
extra_scripts = pre:tools/pio_strip_lvgl_asm.py
monitor_speed   = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
lib_deps =
  https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#esp32s3
  lvgl/lvgl@9.2.2
  bblanchon/ArduinoJson@^7.2.0
build_flags =
  ${common.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_T5_S3=1

; ---------------------------------------------------------------------------
; Host unit tests for the pure domain/ layer (no Arduino, no hardware).
; Only test/ sources are compiled; all src/*.cpp (Arduino) are filtered out.
; ---------------------------------------------------------------------------
[env:native-test]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags =
  -DUNIT_TEST
  -std=gnu++17
  -Iinclude
  -Isrc

; ---------------------------------------------------------------------------
; Boot diagnostic — minimal sketch, no libraries. Isolates board/PSRAM.
; ---------------------------------------------------------------------------
[env:diag]
platform  = espressif32@6.7.0
framework = arduino
board     = esp32dev
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
build_src_filter = -<*> +<diag.cpp>
build_flags =
  -DDIAG_BUILD
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCORE_DEBUG_LEVEL=3
